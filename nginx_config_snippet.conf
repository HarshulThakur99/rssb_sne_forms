# NGINX Configuration Snippet for RSSB SNE Forms Application
# This file should be included in your main nginx server block
# 
# Location: /etc/nginx/sites-available/rssb_sne_forms (or similar)
# Don't forget to create symlink: sudo ln -s /etc/nginx/sites-available/rssb_sne_forms /etc/nginx/sites-enabled/
#
# After updating, test with: sudo nginx -t
# Then reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # Replace with your actual domain

    # CRITICAL: Increase client body size to allow file uploads up to 20MB
    # This prevents HTTP 413 "Request Entity Too Large" errors
    # Should be larger than Flask's MAX_CONTENT_LENGTH (16MB) to handle overhead
    client_max_body_size 20M;
    
    # Timeouts for large file uploads
    client_body_timeout 300s;
    client_header_timeout 300s;
    
    # Buffer sizes
    client_body_buffer_size 128k;
    
    # Root application location
    location / {
        # Proxy to Gunicorn (adjust port if different)
        proxy_pass http://127.0.0.1:8000;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable buffering for large requests
        proxy_request_buffering off;
    }
    
    # Static files (optional, for better performance)
    location /static/ {
        alias /path/to/rssb_sne_forms/app/static/;  # Replace with your actual path
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}

# SSL/HTTPS Configuration (recommended for production)
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;  # Replace with your actual domain
    
    # SSL Certificate paths (update after running certbot)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # CRITICAL: Increase client body size for HTTPS as well
    client_max_body_size 20M;
    client_body_timeout 300s;
    client_header_timeout 300s;
    client_body_buffer_size 128k;
    
    # Root application location
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }
    
    # Static files
    location /static/ {
        alias /path/to/rssb_sne_forms/app/static/;  # Replace with your actual path
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$server_name$request_uri;
}
